server:
  port: 8082

spring:
  application:
    name: quiz-ai

  threads:
    virtual:
      enabled: true

  config:
    import:
      - optional:file:./config/  # Override to disable Nacos import

  main:
    allow-bean-definition-overriding: true  # Allow bean overriding for AI models

  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    stream:
      enabled: false

  autoconfigure:
    exclude:
      - org.springframework.cloud.stream.config.BindingServiceAutoConfiguration
      - org.springframework.cloud.stream.config.BinderFactoryAutoConfiguration

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

spring.ai.dashscope:
  api-key: ${AI_DASHSCOPE_API_KEY:sk-placeholder-for-testing}
  chat:
    options:
      model: qwen-max
      temperature: 0.7

# DeepSeek configuration for simple mode
spring.ai.deepseek:
  api-key: ${DEEPSEEK_API_KEY:sk-f7834ae5538b4990af51be9697b134a7}
  chat:
    options:
      model: deepseek-chat
      temperature: 0.7

knife4j:
  enable: true

logging:
  level:
    com.t3a.ai: DEBUG
