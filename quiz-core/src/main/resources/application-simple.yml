server:
  port: 8081

spring:
  application:
    name: quiz-core

  threads:
    virtual:
      enabled: true

  main:
    allow-circular-references: true  # Temporary fix for Spring Security circular dependency

  cloud:
    stream:
      # Disable Spring Cloud Stream binding to avoid NullPointerException
      enabled: false
    nacos:
      discovery:
        server-addr: localhost:8848
        username: nacos
        password: nacos
        enabled: false  # Disable for standalone testing
      config:
        server-addr: localhost:8848
        username: nacos
        password: nacos
        enabled: false  # Disable for standalone testing

  autoconfigure:
    exclude:
      - org.springframework.cloud.stream.config.BindingServiceAutoConfiguration
      - org.springframework.cloud.stream.config.BinderFactoryAutoConfiguration
      - org.springframework.integration.config.IntegrationAutoConfiguration
      - org.springframework.integration.jmx.IntegrationAutoConfiguration
      - org.springframework.boot.autoconfigure.integration.IntegrationAutoConfiguration
      - com.alibaba.cloud.stream.binder.rocketmq.consuming.RocketMQConsumerAutoConfiguration
      - com.alibaba.cloud.stream.binder.rocketmq.producing.RocketMQProducerAutoConfiguration
      - com.alibaba.cloud.stream.binder.rocketmq.config.RocketMQBinderAutoConfiguration

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/t3a_quiz?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20

  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted

knife4j:
  enable: true
  openapi:
    title: Quiz Core API
    version: 1.0.0

logging:
  level:
    com.t3a.core: DEBUG

#debug: true  # Disable debug logging
