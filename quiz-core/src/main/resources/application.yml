server:
  port: 8081
  servlet:
    context-path: /quiz
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8

spring:
  application:
    name: quiz-core
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # 虚拟线程配置（JDK 17+）
  threads:
    virtual:
      enabled: true

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: test-again-and-again
      config:
        server-addr: localhost:8848
        namespace: test-again-and-again
        file-extension: yml
        import-check:
          enabled: false  # 禁用 Nacos 配置导入检查

  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/t3a_quiz?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&connectionCollation=utf8mb4_unicode_ci
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      validation-query: SELECT 1

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# Knife4j 配置
knife4j:
  enable: true
  openapi:
    title: Quiz Core API
    description: Question bank management and session tracking
    version: 1.0.0
    contact:
      name: T3A Team

# 日志配置
logging:
  level:
    com.t3a.core: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
