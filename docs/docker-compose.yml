services:
  # MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: t3a-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: t3a_quiz
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./quiz-core/src/main/resources/sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - t3a-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 7.0
  redis:
    image: redis:7.0-alpine
    container_name: t3a-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - t3a-network

  # Nacos 2.3
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: t3a-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
      NACOS_AUTH_IDENTITY_KEY: nacos
      NACOS_AUTH_IDENTITY_VALUE: nacos
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - t3a-network
    restart: on-failure

  # RocketMQ NameServer
  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: t3a-rocketmq-namesrv
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT_EXT: "-Xms512M -Xmx512M"
    command: sh mqnamesrv
    networks:
      - t3a-network

  # RocketMQ Broker
  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: t3a-rocketmq-broker
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      JAVA_OPT_EXT: "-Xms512M -Xmx512M"
    command: sh mqbroker -c /home/rocketmq/broker.conf
    depends_on:
      - rocketmq-namesrv
    volumes:
      - ./docker/rocketmq/broker.conf:/home/rocketmq/broker.conf
    networks:
      - t3a-network

  # RocketMQ Console (Optional - for monitoring)
  rocketmq-console:
    image: apacherocketmq/rocketmq-console:2.0.0
    container_name: t3a-rocketmq-console
    ports:
      - "8180:8080"
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876 -Dcom.rocketmq.sendMessageWithVIPChannel=false"
    depends_on:
      - rocketmq-namesrv
    networks:
      - t3a-network

  # Sentinel Dashboard (Optional - for monitoring)
  sentinel-dashboard:
    image: bladex/sentinel-dashboard:latest
    container_name: t3a-sentinel
    ports:
      - "8858:8858"
    networks:
      - t3a-network

volumes:
  mysql-data:
  redis-data:

networks:
  t3a-network:
    driver: bridge
