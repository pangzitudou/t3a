# 简化版 Docker Compose - 仅启动核心服务
# 适用于快速开发和测试

services:
  # MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: t3a-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: t3a_quiz
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Redis 7.0
  redis:
    image: redis:7.0-alpine
    container_name: t3a-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
